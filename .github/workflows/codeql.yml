name: CodeQL

# Static-analysis sweep for Python and TS/JS. Runs on every push/PR to
# main and once a week so freshly published CodeQL rules can flag old
# code without needing a code change to trigger them.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 13:00 UTC = 09:00 ET. Off-peak for the GHA shared pool.
    - cron: "0 13 * * 1"

permissions:
  contents: read
  security-events: write   # required to upload CodeQL results
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-extended pulls in extra precision-bin queries
          # (taint tracking, command/SQL injection, path traversal).
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
