# Local dev stack for the BNY DDQ platform.
# Backends here back the in-memory adapters specified in `docs/ddq.md` §2 + §9.3.
# Each service runs ephemerally; data lives under ./volume which is git-ignored.
#
# Usage from repo root:
#   docker compose -f infra/docker/docker-compose.yml up -d
#   docker compose -f infra/docker/docker-compose.yml down -v   # wipe state

services:
  # ── S3 + KMS via LocalStack ─────────────────────────────────────
  # ddq.md §5: knowledge raw + parquet, library sealed, taxonomy snapshots.
  # DATA-PLAN §3.2 names the two knowledge buckets.
  localstack:
    image: localstack/localstack:3.8
    container_name: ddq-localstack
    ports:
      - "4566:4566"           # edge port
    environment:
      SERVICES: "s3,kms,sts,iam"
      DEBUG: "0"
      PERSISTENCE: "1"
      AWS_DEFAULT_REGION: "us-east-1"
      LOCALSTACK_HOST: "localhost.localstack.cloud:4566"
    volumes:
      - ./volume/localstack:/var/lib/localstack
      - ./localstack-init.sh:/etc/localstack/init/ready.d/init-buckets.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── MongoDB ─────────────────────────────────────────────────────
  # ddq.md §5: live state for knowledge.documents, taxonomy.questions,
  # library.entries, audit.events (hot 30-day window), runs.live.
  mongo:
    image: mongo:7
    container_name: ddq-mongo
    ports:
      # Host 27018 → container 27017 to avoid clashing with other local Mongos.
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ddq
      MONGO_INITDB_ROOT_PASSWORD: ddq-dev
    volumes:
      - ./volume/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ── Redis ───────────────────────────────────────────────────────
  # ddq.md §2: run-state cache, idempotency keys; §L03: retrieval cache.
  redis:
    image: redis:7-alpine
    container_name: ddq-redis
    ports:
      - "6379:6379"
    volumes:
      - ./volume/redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ── OpenSearch ──────────────────────────────────────────────────
  # ddq.md §L03: lexical retrieval (BM25). Single-node dev mode.
  opensearch:
    image: opensearchproject/opensearch:2.16.0
    container_name: ddq-opensearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: "single-node"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "DdqDev!Strong#2026"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./volume/opensearch:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s"]
      interval: 15s
      timeout: 8s
      retries: 8

  # ── Qdrant ──────────────────────────────────────────────────────
  # ddq.md §L03: dense retrieval (HNSW); §L05: synonym/description embeddings.
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: ddq-qdrant
    ports:
      - "6333:6333"           # HTTP
      - "6334:6334"           # gRPC
    volumes:
      - ./volume/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ── Neo4j ───────────────────────────────────────────────────────
  # ddq.md §L05: taxonomy relations; §L03: control→evidence linkage.
  neo4j:
    image: neo4j:5.23-community
    container_name: ddq-neo4j
    ports:
      - "7474:7474"           # browser
      - "7687:7687"           # bolt
    environment:
      NEO4J_AUTH: "neo4j/ddq-dev-strong"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./volume/neo4j/data:/data
      - ./volume/neo4j/logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6

  # Temporal dev server is added in M3 (ddq.md §10) per DATA-PLAN §8 Day 13-14.
  # Skipped here to keep the Day 1-2 stack lean.
